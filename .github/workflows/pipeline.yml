name: Full SRE Pipeline

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag for rollback (leave empty for new build)"
        required: false
env:
  AWS_REGION: ap-southeast-1
  ECR_REPO: myapp
  ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set tag
      run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

    - name: Run test
      run: |
        pip install pytest
        pytest tests/

    - name: Build image
      run: docker build -t $ECR_REPO:$TAG .

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login ECR
      run: |
        aws ecr get-login-password \
        | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  
    - name: Ensure ECR exists
      run: |
        aws ecr describe-repositories --repository-names $ECR_REPO \
        || aws ecr create-repository --repository-name $ECR_REPO
    - name: Push image
      run: |
        docker tag $ECR_REPO:$TAG $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$TAG
        docker push $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$TAG

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform deploy
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve \
          -var="image=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$TAG"